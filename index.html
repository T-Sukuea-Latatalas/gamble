<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Classic</title>
    <style>
        /* ==========================================================================
           1. 基本レイアウトとカラーテーマ (スクロール不要化)
           ========================================================================== */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* スクロールを完全に無効化 */
        }

        body {
            background: radial-gradient(circle, #1a4d1a 0%, #0d260d 100%);
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            box-sizing: border-box;
            user-select: none;
            padding: 1vh;
        }

        .game-container {
            width: 100%;
            max-width: 1000px;
            height: 100%;
            max-height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 1vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* 画面上部のリセットバー */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            width: 100%;
            flex-shrink: 0;
        }

        .reset-btn {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: rgba(255, 255, 255, 0.7);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            border-color: #ffffff;
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* ヘッダーエリア */
        .header {
            text-align: center;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 5px;
            flex-shrink: 0;
        }

        .header h1 {
            margin: 0 0 5px 0;
            font-size: clamp(18px, 3vh, 26px);
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            color: #ffd700;
        }

        .balance-container {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .info-box {
            background-color: rgba(0, 0, 0, 0.6);
            border: 1px solid #ffd700;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: clamp(12px, 1.8vh, 16px);
            min-width: 100px;
            box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .info-box span {
            font-weight: bold;
            color: #ffd700;
        }

        /* ==========================================================================
           2. テーブルエリア（カード配置・状況表示）
           ========================================================================== */
        .table-area {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            flex: 1;
            min-height: 0; /* 縦潰れを防止し、はみ出ないように縮小 */
            gap: 10px;
            background-color: rgba(0, 0, 0, 0.25);
            border-radius: 15px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dealer-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 0;
        }

        .player-section {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 0;
        }

        .section-title {
            margin: 0 0 5px 0;
            font-size: clamp(12px, 2vh, 18px);
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ccc;
        }

        .score-badge {
            background-color: #e53935;
            color: white;
            font-size: clamp(11px, 1.6vh, 14px);
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 0;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }

        /* スプリット対応のプレイヤーエリア */
        .hands-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            height: 100%;
            min-height: 0;
            align-items: stretch;
        }

        .hand-wrapper {
            background-color: rgba(0, 0, 0, 0.4);
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 8px;
            flex: 1;
            min-width: 0;
            max-width: 450px;
            position: relative;
            box-sizing: border-box;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* アクティブな手札を目立たせる */
        .hand-wrapper.active {
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            background-color: rgba(255, 215, 0, 0.05);
        }

        .hand-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .hand-title {
            font-weight: bold;
            font-size: clamp(12px, 1.8vh, 16px);
        }

        .hand-footer {
            margin-top: 5px;
            font-size: clamp(11px, 1.6vh, 14px);
            color: #ffd700;
            text-align: right;
        }

        /* ==========================================================================
           3. カード（トランプ）の3Dフリップ＆スライドデザイン（emによるスケール化）
           ========================================================================== */
        .card-wrapper-3d {
            font-size: clamp(8px, 1.4vh, 13px); /* 画面の高さに応じてカード基準サイズが決定 */
            width: 6.2em;
            height: 9em;
            perspective: 1000px;
            flex-shrink: 0;
            position: relative;
            opacity: 1; /* 初期不透明度を1にし、スライド完了後の急な消滅を防ぐ */
        }

        /* 配る時のスライド出現アニメーション */
        .card-wrapper-3d.deal-animate {
            animation: card-slide 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.1) forwards;
        }

        @keyframes card-slide {
            from {
                opacity: 0; /* 開始時に透明から入るようにしてフェードインを維持 */
                transform: translate(150px, -150px) scale(0.6) rotate(20deg);
            }
            to {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0);
            }
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.15);
        }

        /* 表を向けたときに裏返す */
        .card-wrapper-3d.revealed .card-inner {
            transform: rotateY(180deg);
        }

        /* すでに配り終えて公開されているカードはトランジションを無効化 */
        .card-wrapper-3d.no-transition .card-inner {
            transition: none !important;
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 0.6em;
            box-shadow: 0 0.3em 0.6em rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
        }

        /* カードの表面 */
        .card-front {
            background-color: #ffffff;
            transform: rotateY(180deg);
            color: #000000;
            position: relative;
        }

        .card-front.red {
            color: #d32f2f;
        }

        .card-front.black {
            color: #1a1a1a;
        }

        .card-corner-top {
            position: absolute;
            top: 0.4em;
            left: 0.6em;
            font-size: 1.1em;
            font-weight: bold;
            line-height: 1;
        }

        .card-suit-center {
            font-size: 2.6em;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .card-corner-bottom {
            position: absolute;
            bottom: 0.4em;
            right: 0.6em;
            font-size: 1.1em;
            font-weight: bold;
            line-height: 1;
            transform: rotate(180deg);
        }

        /* カードの裏面（ディーラーホールカード等） */
        .card-back {
            background: repeating-linear-gradient(
                45deg,
                #9a0007,
                #9a0007 0.6em,
                #d32f2f 0.6em,
                #d32f2f 1.2em
            );
            border: 0.2em solid #ffffff;
        }

        /* ==========================================================================
           4. 結果通知バッジ（登場バウンドアニメーション）
           ========================================================================== */
        .result-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0) rotate(-12deg);
            background: rgba(0, 0, 0, 0.95);
            padding: 8px 16px;
            font-size: clamp(14px, 2.2vh, 18px);
            font-weight: bold;
            border-radius: 6px;
            z-index: 10;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
            text-align: center;
            opacity: 0;
            /* バウンド登場アニメーション */
            animation: badge-bounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes badge-bounce {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(-30deg);
                opacity: 0;
            }
            70% {
                transform: translate(-50%, -50%) scale(1.2) rotate(-10deg);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1) rotate(-12deg);
                opacity: 1;
            }
        }

        .result-badge.win {
            border: 3px solid #4caf50;
            color: #4caf50;
        }

        .result-badge.lose {
            border: 3px solid #f44336;
            color: #f44336;
        }

        .result-badge.push {
            border: 3px solid #9e9e9e;
            color: #9e9e9e;
        }

        .result-badge.bj {
            border: 3px solid #ffd700;
            color: #ffd700;
            animation: badge-bounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, pulse 1.2s infinite alternate 0.5s;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) rotate(-12deg) scale(1.0); }
            100% { transform: translate(-50%, -50%) rotate(-12deg) scale(1.1); }
        }

        /* 紙吹雪・パーティクル演出用 */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            opacity: 1;
            animation: explode 1.2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes explode {
            0% {
                transform: translate3d(0, 0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate3d(var(--tx), var(--ty), 0) scale(0);
                opacity: 0;
            }
        }

        /* ==========================================================================
           5. メッセージ・操作パネル
           ========================================================================== */
        #message-bar {
            background-color: rgba(0, 0, 0, 0.7);
            border-left: 5px solid #ffd700;
            padding: 8px 10px;
            border-radius: 4px;
            font-size: clamp(12px, 1.8vh, 15px);
            min-height: 1.2em;
            text-align: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 12px;
            flex-shrink: 0;
        }

        /* チップ操作 */
        .chip-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        .chip {
            width: clamp(38px, 6.5vh, 52px);
            height: clamp(38px, 6.5vh, 52px);
            border-radius: 50%;
            border: 3px dashed #ffffff;
            color: #ffffff;
            font-size: clamp(11px, 1.4vh, 14px);
            font-weight: bold;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 3px 5px rgba(0, 0, 0, 0.5);
            transition: transform 0.15s, opacity 0.2s;
        }

        .chip:active:not(:disabled) {
            transform: scale(0.9);
        }

        .chip:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        /* チップカラーの定義 */
        .chip-1 { background-color: #78909c; }
        .chip-5 { background-color: #ff7043; }
        .chip-10 { background-color: #1e88e5; }
        .chip-50 { background-color: #43a047; }
        .chip-100 { background-color: #e53935; }
        .chip-500 { background-color: #8e24aa; }
        .chip-1000 { background-color: #ffb300; color: #111; border-color: #111; }
        .chip-5000 { background-color: #00e5ff; color: #111; border-color: #111; }

        /* アクションボタン共通設定 */
        .action-btn {
            background-color: #2e7d32;
            color: #ffffff;
            border: none;
            padding: 10px 16px;
            font-size: clamp(12px, 1.6vh, 15px);
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 0 #1b5e20;
            transition: all 0.1s ease;
            min-width: 80px;
            text-transform: uppercase;
        }

        .action-btn:hover:not(:disabled) {
            background-color: #388e3c;
        }

        .action-btn:active:not(:disabled) {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1b5e20;
        }

        .action-btn:disabled {
            background-color: #555555;
            color: #888888;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
            opacity: 0.5;
        }

        .action-controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* 個別ボタンのカラー */
        .deal-btn {
            background-color: #d32f2f;
            box-shadow: 0 4px 0 #9a0007;
            min-width: 120px;
        }
        .deal-btn:hover:not(:disabled) { background-color: #e53935; }
        .deal-btn:active:not(:disabled) { box-shadow: 0 1px 0 #9a0007; }

        .clear-btn {
            background-color: #757575;
            box-shadow: 0 4px 0 #424242;
        }
        .clear-btn:hover:not(:disabled) { background-color: #9e9e9e; }
        .clear-btn:active:not(:disabled) { box-shadow: 0 1px 0 #424242; }

        .allin-btn {
            background-color: #ff9100;
            box-shadow: 0 4px 0 #b36400;
        }
        .allin-btn:hover:not(:disabled) { background-color: #ffa726; }
        .allin-btn:active:not(:disabled) { box-shadow: 0 1px 0 #b36400; }

        /* 借金・返済ボタンのカラー */
        .borrow-btn {
            background-color: #0288d1;
            box-shadow: 0 4px 0 #01579b;
        }
        .borrow-btn:hover:not(:disabled) { background-color: #03a9f4; }
        .borrow-btn:active:not(:disabled) { box-shadow: 0 1px 0 #01579b; }

        .repay-btn {
            background-color: #f57c00;
            box-shadow: 0 4px 0 #e65100;
        }
        .repay-btn:hover:not(:disabled) { background-color: #ff9800; }
        .repay-btn:active:not(:disabled) { box-shadow: 0 1px 0 #e65100; }

        /* ==========================================================================
           6. レスポンシブ設計（スマートフォン対応）
           ========================================================================== */
        @media (max-width: 600px) {
            .card-wrapper-3d {
                font-size: clamp(6px, 1.2vh, 11px);
            }
            .chip {
                width: 38px;
                height: 38px;
                font-size: 10px;
                border-width: 2px;
            }
            .action-btn {
                padding: 8px 12px;
                font-size: 12px;
                min-width: 65px;
            }
            .deal-btn { min-width: 90px; }
            .hand-wrapper {
                padding: 6px;
            }
            .header h1 { font-size: 18px; }
            .info-box { font-size: 12px; padding: 4px 8px; min-width: 80px; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <!-- リセットボタン -->
    <div class="top-bar">
        <button class="reset-btn" onclick="resetGame()">RESET GAME</button>
    </div>

    <!-- ヘッダー（残高・ベット額・借金） -->
    <div class="header">
        <h1>♠ Blackjack Classic ♦</h1>
        <div class="balance-container">
            <div class="info-box">残高: <span id="bankroll-val">$1000</span></div>
            <div class="info-box">ベット: <span id="bet-val">$0</span></div>
            <div class="info-box">借金: <span id="debt-val">$0</span></div>
        </div>
    </div>

    <!-- カジノテーブル -->
    <div class="table-area">
        <!-- ディーラーエリア -->
        <div class="dealer-section">
            <h2 class="section-title">
                Dealer <span id="dealer-score-badge" class="score-badge" style="display: none;">0</span>
            </h2>
            <div id="dealer-cards" class="cards-container"></div>
        </div>

        <!-- プレイヤーエリア（スプリット時は複数表示） -->
        <div class="player-section">
            <div id="player-hands-container" class="hands-container"></div>
        </div>
    </div>

    <!-- メッセージバー -->
    <div id="message-bar">チップをクリックしてベットを決め、DEALを押してください。</div>

    <!-- コントロール類 -->
    <div class="controls">
        <!-- チップ選択（JavaScriptにより動的に描画されます） -->
        <div class="chip-controls" id="chip-area"></div>

        <!-- ゲームアクション -->
        <div class="action-controls">
            <button class="action-btn deal-btn" id="btn-deal" onclick="handleDealBtn()">DEAL</button>
            <button class="action-btn" id="btn-hit" onclick="hit()">HIT</button>
            <button class="action-btn" id="btn-stand" onclick="stand()">STAND</button>
            <button class="action-btn" id="btn-double" onclick="doubleDown()">DOUBLE</button>
            <button class="action-btn" id="btn-split" onclick="split()">SPLIT</button>
        </div>
    </div>
</div>

<script>
    /* ==========================================================================
       Web Audio APIによるシンセ効果音クラス
       ========================================================================== */
    class SoundEffects {
        constructor() {
            this.ctx = null;
        }

        init() {
            if (!this.ctx) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (this.ctx.state === 'suspended') {
                this.ctx.resume();
            }
        }

        // カードが配られる・めくれる時の摩擦音
        playCard() {
            this.init();
            const ctx = this.ctx;
            const now = ctx.currentTime;
            
            // ノイズバッファの生成（シュッという摩擦音を表現）
            const bufferSize = ctx.sampleRate * 0.12;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            const noise = ctx.createBufferSource();
            noise.buffer = buffer;

            // バンドパスフィルタ
            const filter = ctx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.setValueAtTime(1000, now);
            filter.frequency.exponentialRampToValueAtTime(3000, now + 0.12);

            // 音量調整
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.08, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(ctx.destination);

            noise.start(now);
        }

        // コインクリック・ベット時の音（チリン）
        playCoin() {
            this.init();
            const ctx = this.ctx;
            const now = ctx.currentTime;

            // 金属音をシミュレートする2基のサイン波
            const osc1 = ctx.createOscillator();
            const osc2 = ctx.createOscillator();
            const gain = ctx.createGain();

            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(ctx.destination);

            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(987.77, now); // B5
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(1318.51, now); // E6

            gain.gain.setValueAtTime(0.06, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);

            osc1.start(now);
            osc2.start(now);
            osc1.stop(now + 0.25);
            osc2.stop(now + 0.25);
        }

        // プレイヤーバスト・負け時（ソ〜ファ〜ミ〜の下りコード）
        playLose() {
            this.init();
            const ctx = this.ctx;
            const now = ctx.currentTime;
            
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(392.00, now); // G4
            osc.frequency.linearRampToValueAtTime(349.23, now + 0.2); // F4
            osc.frequency.linearRampToValueAtTime(311.13, now + 0.4); // Eb4

            gain.gain.setValueAtTime(0.06, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);

            osc.start(now);
            osc.stop(now + 0.6);
        }

        // 勝ち・ブラックジャック時（アルペジオ上昇音）
        playWin() {
            this.init();
            const ctx = this.ctx;
            const now = ctx.currentTime;
            const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6

            notes.forEach((freq, idx) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now + idx * 0.1);

                gain.gain.setValueAtTime(0, now);
                gain.gain.setValueAtTime(0.05, now + idx * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.1 + 0.35);

                osc.start(now + idx * 0.1);
                osc.stop(now + idx * 0.1 + 0.4);
            });
        }
    }

    const sfx = new SoundEffects();

    /* ==========================================================================
       JavaScript ゲームロジック
       ========================================================================== */

    // カードの定義
    const SUITS = ['♠', '♥', '♦', '♣'];
    const RANKS = [
        { name: 'A', value: 11 },
        { name: '2', value: 2 },
        { name: '3', value: 3 },
        { name: '4', value: 4 },
        { name: '5', value: 5 },
        { name: '6', value: 6 },
        { name: '7', value: 7 },
        { name: '8', value: 8 },
        { name: '9', value: 9 },
        { name: '10', value: 10 },
        { name: 'J', value: 10 },
        { name: 'Q', value: 10 },
        { name: 'K', value: 10 }
    ];

    // チップ構成の定義
    const CHIP_VALUES = [1, 5, 10, 50, 100, 500, 1000, 5000];
    const CHIP_CLASSES = {
        1: 'chip-1',
        5: 'chip-5',
        10: 'chip-10',
        50: 'chip-50',
        100: 'chip-100',
        500: 'chip-500',
        1000: 'chip-1000',
        5000: 'chip-5000'
    };

    // ゲーム状態変数
    let bankroll = 1000;
    let currentBet = 0;
    let debt = 0; // 借金額
    let deck = [];
    let dealerHand = { cards: [], score: 0, visibleScore: 0 };
    let playerHands = []; // 複数の手を管理（スプリット対応）
    let activeHandIndex = 0; // 現在操作中の手札のインデックス
    let gameState = 'betting'; // 'betting' | 'dealing' | 'player-turn' | 'dealer-turn' | 'round-over' | 'game-over'
    let isProcessing = false; // 非同期連打・衝突防止用フラグ

    // 汎用ウェイト用Promise
    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    /**
     * デッキを作成する（4デッキ構成）
     */
    function createDeck() {
        const newDeck = [];
        const numDecks = 4;
        for (let d = 0; d < numDecks; d++) {
            for (const suit of SUITS) {
                for (const rank of RANKS) {
                    newDeck.push({
                        suit: suit,
                        name: rank.name,
                        value: rank.value,
                        isRed: (suit === '♥' || suit === '♦')
                    });
                }
            }
        }
        return newDeck;
    }

    /**
     * デッキをシャッフルする（Fisher-Yatesシャッフル）
     */
    function shuffle(deckToShuffle) {
        for (let i = deckToShuffle.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deckToShuffle[i], deckToShuffle[j]] = [deckToShuffle[j], deckToShuffle[i]];
        }
    }

    /**
     * デッキからカードを1枚引く（無くなったら自動で山を再構築・再シャッフル）
     */
    function drawCard() {
        if (deck.length === 0) {
            deck = createDeck();
            shuffle(deck);
            logMessage("シューに新しいカードを追加し、シャッフルしました。");
        }
        const card = deck.pop();
        // ユニークなIDと初期状態を設定
        card.id = 'card-' + Math.random().toString(36).substr(2, 9);
        card.isRevealed = false;
        card.hasAnimatedDeal = false;   // 配るアニメーション再生フラグ
        card.hasAnimatedReveal = false; // めくるアニメーション再生フラグ
        return card;
    }

    /**
     * 手札のスコアを計算する（エースの1/11調整対応）
     */
    function calculateScore(cards) {
        let score = 0;
        let aces = 0;
        for (const card of cards) {
            score += card.value;
            if (card.name === 'A') {
                aces++;
            }
        }
        // スコアが21を超えていて、手札にエースがある場合、エースを1（-10点）に変換する
        while (score > 21 && aces > 0) {
            score -= 10;
            aces--;
        }
        return score;
    }

    /**
     * チップボタンクリック時のベット追加
     */
    function addBet(amount) {
        sfx.init();
        if (gameState !== 'betting' || isProcessing) return;
        if (bankroll >= currentBet + amount) {
            currentBet += amount;
            sfx.playCoin();
            checkBankruptcy();
            updateUI();
        } else {
            logMessage("残高が不足しています。");
        }
    }

    /**
     * ベット額のクリア
     */
    function clearBet() {
        sfx.init();
        if (gameState !== 'betting' || isProcessing) return;
        currentBet = 0;
        sfx.playCoin();
        checkBankruptcy(); // クリアしたことによる$0フリーズを監視
        updateUI();
    }

    /**
     * 所持金をすべてベットする（ALL IN）
     */
    function allIn() {
        sfx.init();
        if (gameState !== 'betting' || isProcessing || bankroll <= 0) return;
        currentBet = bankroll;
        sfx.playCoin();
        checkBankruptcy();
        updateUI();
    }

    /**
     * 借金する (Borrow)
     */
    function borrow() {
        sfx.init();
        if (gameState !== 'betting' || isProcessing) return;
        if (debt >= 5000) {
            logMessage("借金は上限（$5000）に達しています。");
            return;
        }
        sfx.playCoin();
        debt += 1000;
        bankroll += 1000;
        logMessage("$1000を借金しました。");
        updateUI();
    }

    /**
     * 返済する (Repay)
     */
    function repay() {
        sfx.init();
        if (gameState !== 'betting' || isProcessing) return;
        const repayAmount = Math.min(1000, debt);
        if (debt <= 0) return;
        if (bankroll < repayAmount) {
            logMessage("返済に必要な残高が不足しています。");
            return;
        }
        sfx.playCoin();
        bankroll -= repayAmount;
        debt -= repayAmount;
        logMessage(`借金を$${repayAmount}返済しました。`);
        checkBankruptcy(); // 返済時の$0スタック条件をチェック
        updateUI();
    }

    /**
     * DEAL / NEXT ROUND の一括管理ボタン処理
     */
    function handleDealBtn() {
        sfx.init();
        if (isProcessing) return;
        if (gameState === 'betting') {
            deal();
        } else if (gameState === 'round-over') {
            nextRound();
        }
    }

    /**
     * プレイヤーにカードを1枚配る（アニメーション同期用）
     */
    async function dealCardToPlayer(handIndex) {
        const card = drawCard();
        playerHands[handIndex].cards.push(card);
        updateUI(); // 一度裏向き（Revealed無し）でDOMに追加

        sfx.playCard();
        await sleep(50); // DOMに要素がマウントされる僅かなタイミングを待つ

        // 状態を反転
        card.isRevealed = true;
        const cardEl = document.getElementById(card.id);
        if (cardEl) {
            cardEl.classList.add('revealed');
        }

        // フリップが完了する時間（約350ms）を待つ
        await sleep(350);
        
        // 表面フリップ完了をフラグに反映
        card.hasAnimatedReveal = true;

        playerHands[handIndex].visibleScore = calculateScore(playerHands[handIndex].cards.filter(c => c.isRevealed));
        updateUI(); // すでに hasAnimatedReveal が true なので、no-transition付きで安定再描画される
    }

    /**
     * ディーラーにカードを1枚配る（アニメーション同期用）
     */
    async function dealCardToDealer(isHoleCard) {
        const card = drawCard();
        dealerHand.cards.push(card);
        updateUI();

        sfx.playCard();
        await sleep(50);

        if (!isHoleCard) {
            card.isRevealed = true;
            const cardEl = document.getElementById(card.id);
            if (cardEl) {
                cardEl.classList.add('revealed');
            }
            await sleep(350);
            // 表面フリップ完了を記録
            card.hasAnimatedReveal = true;
        } else {
            // 裏面（ホールカード）の場合はスライド停止後そのまま終了
            await sleep(350);
        }

        dealerHand.visibleScore = calculateScore(dealerHand.cards.filter(c => c.isRevealed));
        updateUI();
    }

    /**
     * ディーラーの2枚目（ホールカード）を開示する
     */
    async function revealDealerHoleCard() {
        const holeCard = dealerHand.cards.find(c => !c.isRevealed);
        if (holeCard) {
            holeCard.isRevealed = true;
            sfx.playCard();
            const cardEl = document.getElementById(holeCard.id);
            if (cardEl) {
                cardEl.classList.add('revealed');
            }
            await sleep(350);
            // フリップ完了を記録
            holeCard.hasAnimatedReveal = true;
            dealerHand.visibleScore = calculateScore(dealerHand.cards.filter(c => c.isRevealed));
            updateUI();
        }
    }

    /**
     * ラウンドを開始する（DEAL）
     */
    async function deal() {
        if (currentBet <= 0 || gameState !== 'betting' || isProcessing) return;

        isProcessing = true; // 操作をロック

        // ベット金額を残高から引き出す
        bankroll -= currentBet;

        // 手元デッキチェック
        if (deck.length < 20) {
            deck = createDeck();
            shuffle(deck);
        }

        // ゲーム状態をロック
        gameState = 'dealing';
        dealerHand = { cards: [], score: 0, visibleScore: 0 };
        playerHands = [{
            cards: [],
            bet: currentBet,
            status: 'playing',
            score: 0,
            visibleScore: 0,
            result: ''
        }];
        activeHandIndex = 0;
        updateUI();

        // 1枚ずつ「引く → 演出を完全に待つ(500ms)」の順序配布
        await dealCardToPlayer(0);
        await sleep(500);

        await dealCardToDealer(false);
        await sleep(500);

        await dealCardToPlayer(0);
        await sleep(500);

        await dealCardToDealer(true);
        await sleep(500);

        // スコアを内部的に同期
        dealerHand.score = calculateScore(dealerHand.cards);
        playerHands[0].score = calculateScore(playerHands[0].cards);

        const playerHasBJ = playerHands[0].score === 21;
        const dealerHasBJ = dealerHand.score === 21;

        if (playerHasBJ || dealerHasBJ) {
            // ナチュラルBJの場合は即終了（ディーラーのホールカードを開く）
            gameState = 'dealer-turn';
            updateUI();
            await revealDealerHoleCard();
            setTimeout(() => {
                endRound();
            }, 800);
        } else {
            gameState = 'player-turn';
            isProcessing = false; // 操作を解放
            updateUI();
        }
    }

    /**
     * カードを引く（HIT）
     */
    async function hit() {
        if (gameState !== 'player-turn' || isProcessing) return;
        isProcessing = true; // 操作をロック
        const activeHand = playerHands[activeHandIndex];

        // ロック
        gameState = 'dealing';
        updateUI();

        await dealCardToPlayer(activeHandIndex);

        activeHand.score = calculateScore(activeHand.cards);

        if (activeHand.score > 21) {
            activeHand.status = 'busted';
            activeHand.result = 'LOSE';
            logMessage(`Hand ${playerHands.length > 1 ? (activeHandIndex + 1) : ""} がバストしました！`);
            gameState = 'player-turn';
            await moveToNextHand();
        } else if (activeHand.score === 21) {
            activeHand.status = 'stood';
            gameState = 'player-turn';
            await moveToNextHand();
        } else {
            gameState = 'player-turn';
            isProcessing = false; // 操作を再解放
            updateUI();
        }
    }

    /**
     * 手札を確定（STAND）
     */
    async function stand() {
        if (gameState !== 'player-turn' || isProcessing) return;
        isProcessing = true; // 処理完了までロックをかける
        const activeHand = playerHands[activeHandIndex];
        activeHand.status = 'stood';
        await moveToNextHand();
    }

    /**
     * 賭け金を倍にする（DOUBLE DOWN）
     */
    async function doubleDown() {
        if (gameState !== 'player-turn' || isProcessing) return;
        const activeHand = playerHands[activeHandIndex];

        if (activeHand.cards.length !== 2 || bankroll < activeHand.bet) return;

        isProcessing = true; // 操作をロック
        gameState = 'dealing';
        bankroll -= activeHand.bet;
        activeHand.bet *= 2;
        updateUI();

        await dealCardToPlayer(activeHandIndex);

        activeHand.score = calculateScore(activeHand.cards);

        if (activeHand.score > 21) {
            activeHand.status = 'busted';
            activeHand.result = 'LOSE';
        } else {
            activeHand.status = 'stood';
        }

        gameState = 'player-turn';
        await moveToNextHand();
    }

    /**
     * 手札の分割（SPLIT）
     */
    async function split() {
        if (gameState !== 'player-turn' || isProcessing) return;
        const activeHand = playerHands[activeHandIndex];

        if (playerHands.length > 1 || activeHand.cards.length !== 2) return;
        if (activeHand.cards[0].name !== activeHand.cards[1].name) return;
        if (bankroll < activeHand.bet) return;

        isProcessing = true; // 操作をロック
        gameState = 'dealing';
        bankroll -= activeHand.bet;

        // 【視覚的向上】2枚目のカードを滑らかに横にスライド移動させる一時演出
        const cardsInContainer = document.querySelectorAll('#player-hands-container .hand-wrapper .cards-container .card-wrapper-3d');
        if (cardsInContainer.length === 2) {
            const secondCardEl = cardsInContainer[1];
            secondCardEl.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease';
            secondCardEl.style.transform = 'translate(150px, 50px) rotate(15deg)';
            secondCardEl.style.opacity = '0.7';
            await sleep(400); // 演出完了まで待つ
        }

        // 2枚目を取り出し、新規のハンドを作成
        const secondCard = activeHand.cards.pop();
        const newHand = {
            cards: [secondCard],
            bet: activeHand.bet,
            status: 'playing',
            score: 0,
            visibleScore: secondCard.isRevealed ? calculateScore([secondCard]) : 0,
            result: ''
        };

        playerHands.push(newHand);
        activeHand.visibleScore = calculateScore(activeHand.cards);
        updateUI();

        await sleep(350);

        // それぞれにカードを1枚ずつ配る
        await dealCardToPlayer(0);
        await sleep(250);

        await dealCardToPlayer(1);
        await sleep(250);

        activeHand.score = calculateScore(activeHand.cards);
        newHand.score = calculateScore(newHand.cards);

        activeHandIndex = 0;
        gameState = 'player-turn';
        logMessage("スプリットしました。Hand 1からプレイしてください。");
        isProcessing = false; // 開放
        updateUI();
    }

    /**
     * 次の手札へ切り替え、もしくはディーラーのターンに移行
     */
    async function moveToNextHand() {
        if (activeHandIndex < playerHands.length - 1) {
            activeHandIndex++;
            isProcessing = false; // 次のハンドの操作を解放
            updateUI();
        } else {
            await playDealerTurn();
        }
    }

    /**
     * ディーラーのターン
     */
    async function playDealerTurn() {
        gameState = 'dealer-turn';
        updateUI();

        // 伏せていたホールカードをオープン
        await revealDealerHoleCard();

        // プレイヤーのすべての手がバストしているかチェック
        const allBusted = playerHands.every(hand => hand.score > 21);

        if (allBusted) {
            // 全てバストしていればディーラーは引かずに終了
            await sleep(500);
            endRound();
            return;
        }

        // 【最適化ウェイト】1枚配るごとに完全に表を向くまで1000ms間隔に広げて美しく配布
        while (calculateScore(dealerHand.cards) < 17) {
            await sleep(1000);
            await dealCardToDealer(false);
        }

        await sleep(500);
        endRound();
    }

    /**
     * ラウンド終了・配当金の精算
     */
    function endRound() {
        gameState = 'round-over';
        const dScore = dealerHand.score;

        let hasWin = false;
        let hasBJ = false;
        let hasLose = false;

        playerHands.forEach((hand) => {
            const pScore = hand.score;

            if (pScore > 21) {
                hand.result = 'LOSE';
                hand.status = 'busted';
                hasLose = true;
            } else if (dScore > 21) {
                // ディーラーバスト時の勝ち
                if (pScore === 21 && hand.cards.length === 2 && playerHands.length === 1) {
                    hand.result = 'BLACKJACK';
                    hasBJ = true;
                } else {
                    hand.result = 'WIN';
                    hasWin = true;
                }
            } else if (pScore > dScore) {
                if (pScore === 21 && hand.cards.length === 2 && playerHands.length === 1) {
                    hand.result = 'BLACKJACK';
                    hasBJ = true;
                } else {
                    hand.result = 'WIN';
                    hasWin = true;
                }
            } else if (pScore < dScore) {
                hand.result = 'LOSE';
                hasLose = true;
            } else {
                // スコア同点時のブラックジャック優位判定
                const playerIsBJ = pScore === 21 && hand.cards.length === 2 && playerHands.length === 1;
                const dealerIsBJ = dScore === 21 && dealerHand.cards.length === 2;

                if (playerIsBJ && !dealerIsBJ) {
                    hand.result = 'BLACKJACK';
                    hasBJ = true;
                } else if (!playerIsBJ && dealerIsBJ) {
                    hand.result = 'LOSE';
                    hasLose = true;
                } else {
                    hand.result = 'PUSH';
                }
            }

            // 配当金の分配
            if (hand.result === 'BLACKJACK') {
                bankroll += Math.floor(hand.bet * 2.5); // 1.5倍プラス
            } else if (hand.result === 'WIN') {
                bankroll += hand.bet * 2; // 1.0倍プラス
            } else if (hand.result === 'PUSH') {
                bankroll += hand.bet; // ベット返却
            }
        });

        // 勝利・敗北効果音とパーティクルのトリガー
        if (hasBJ) {
            sfx.playWin();
            createParticles('#ffd700'); // 金色の星屑
        } else if (hasWin) {
            sfx.playWin();
            createParticles('#4caf50'); // 緑の星屑
        } else if (hasLose) {
            sfx.playLose();
        }

        // 破産・極小金額時の救済および無効ベットの調整
        checkBankruptcy();
        if (gameState !== 'game-over') {
            checkBetValidity();
        }

        isProcessing = false; // 一連のターン非同期処理の完全解放
        updateUI();
    }

    /**
     * 星屑風のパーティクル生成エフェクト
     */
    function createParticles(color) {
        const container = document.body;
        const numParticles = 40;

        for (let i = 0; i < numParticles; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.backgroundColor = color;

            // 画面の中央（もしくはテーブルの中心）付近を起点とする
            const x = window.innerWidth / 2;
            const y = window.innerHeight * 0.45;

            particle.style.left = `${x}px`;
            particle.style.top = `${y}px`;

            // ランダムな方向と強さを割り当て
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 250 + 100;
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance;

            particle.style.setProperty('--tx', `${tx}px`);
            particle.style.setProperty('--ty', `${ty}px`);

            // ランダムサイズ
            const size = Math.random() * 7 + 4;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;

            container.appendChild(particle);

            // 終了後にDOMから消去
            setTimeout(() => {
                particle.remove();
            }, 1200);
        }
    }

    /**
     * 次のラウンドへのリセット準備
     */
    function nextRound() {
        if (gameState !== 'round-over') return;

        checkBetValidity();

        gameState = 'betting';
        dealerHand = { cards: [], score: 0, visibleScore: 0 };
        playerHands = [];
        activeHandIndex = 0;

        checkBankruptcy(); // 新規ラウンド遷移時のスタックを自動チェック

        updateUI();
    }

    /**
     * ベット金額が現在の所持金を超えないようにチェックする
     */
    function checkBetValidity() {
        if (currentBet > bankroll) {
            currentBet = bankroll;
        }
    }

    /**
     * 万が一全財産を失った場合の救済措置（スタック防止）
     */
    function checkBankruptcy() {
        if (bankroll === 0 && currentBet === 0) {
            if (debt < 5000) {
                debt += 1000;
                bankroll = 1000;
                sfx.playCoin();
                logMessage("残高がなくなりました。自動借金により$1000を調達し、救済されました。");
            } else {
                gameState = 'game-over';
                logMessage("借金上限（$5000）に達し、救済不可能です。RESET GAMEボタンでやり直してください。");
            }
        }
    }

    /**
     * ゲームを完全に初期状態にリセットする
     */
    function resetGame() {
        sfx.init();
        if (confirm("ゲーム全体を初期状態にリセットし、資金を$1000に戻しますか？")) {
            bankroll = 1000;
            currentBet = 0;
            debt = 0;
            isProcessing = false;
            gameState = 'betting';
            dealerHand = { cards: [], score: 0, visibleScore: 0 };
            playerHands = [];
            activeHandIndex = 0;
            deck = createDeck();
            shuffle(deck);
            
            // DOMの全クリアを最初だけ実行
            document.getElementById('dealer-cards').innerHTML = '';
            document.getElementById('player-hands-container').innerHTML = '';

            updateUI();
            logMessage("ゲームをリセットしました。ベットを選択してスタートしてください。");
        }
    }

    /**
     * メッセージ表示
     */
    function logMessage(text) {
        document.getElementById('message-bar').textContent = text;
    }

    /**
     * トランプカードのHTML生成（3Dモデル構造）
     */
    function createCardHTML(card) {
        const colorClass = card.isRed ? 'red' : 'black';
        const revealedClass = card.isRevealed ? 'revealed' : '';
        
        // 配るアニメーションクラスの付与（一度描画されたら deal-animate を外す）
        const animateClass = card.hasAnimatedDeal ? '' : 'deal-animate';

        // すでに裏から表へめくられている（フリップが完了している）カードはフリップ効果（トランジション）を無効化
        const noTransitionClass = card.hasAnimatedReveal ? 'no-transition' : '';

        // フラグを更新（初回HTML生成の評価が終わった後に切り替え）
        card.hasAnimatedDeal = true;

        return `
            <div class="card-wrapper-3d ${animateClass} ${revealedClass} ${noTransitionClass}" id="${card.id}">
                <div class="card-inner">
                    <div class="card-front ${colorClass}">
                        <div class="card-corner-top">${card.name}<br>${card.suit}</div>
                        <div class="card-suit-center">${card.suit}</div>
                        <div class="card-corner-bottom">${card.name}<br>${card.suit}</div>
                    </div>
                    <div class="card-back"></div>
                </div>
            </div>
        `;
    }

    /**
     * DOM要素の差分更新・維持制御（DOM破壊の完全防止）
     */
    function syncCardsDOM(container, cards) {
        // 1. 不要なDOM（配列にないidのDOM）を削除
        const cardIds = new Set(cards.map(c => c.id));
        Array.from(container.children).forEach(child => {
            if (!cardIds.has(child.id)) {
                child.remove();
            }
        });

        // 2. 配列の順番に沿ってDOMを挿入・更新
        cards.forEach((card, idx) => {
            let cardEl = document.getElementById(card.id);
            if (!cardEl) {
                // 新規カードをDOMに挿入
                const temp = document.createElement('div');
                temp.innerHTML = createCardHTML(card);
                cardEl = temp.firstElementChild;
                
                // 順番を守るために insertBefore または appendChild
                if (idx < container.children.length) {
                    container.insertBefore(cardEl, container.children[idx]);
                } else {
                    container.appendChild(cardEl);
                }
            } else {
                // 既存カードの状態更新（トランジションを壊さずに同期）
                if (card.isRevealed && !cardEl.classList.contains('revealed')) {
                    cardEl.classList.add('revealed');
                }
                if (card.hasAnimatedReveal && !cardEl.classList.contains('no-transition')) {
                    cardEl.classList.add('no-transition');
                }
                // 位置の検証（スプリット時のハンド間カード移動に対応）
                if (container.children[idx] !== cardEl) {
                    if (idx < container.children.length) {
                        container.insertBefore(cardEl, container.children[idx]);
                    } else {
                        container.appendChild(cardEl);
                    }
                }
            }
        });
    }

    /**
     * ディーラーハンドDOMの差分更新
     */
    function updateDealerHandDOM() {
        const dealerCardsDiv = document.getElementById('dealer-cards');
        syncCardsDOM(dealerCardsDiv, dealerHand.cards);

        const dBadge = document.getElementById('dealer-score-badge');
        if (dealerHand.cards.length === 0) {
            dBadge.style.display = 'none';
        } else {
            dBadge.style.display = 'inline-block';
            const hasHoleCard = dealerHand.cards.some(c => !c.isRevealed);
            if (hasHoleCard) {
                dBadge.textContent = `${dealerHand.visibleScore} + ?`;
            } else {
                dBadge.textContent = dealerHand.visibleScore;
            }
        }
    }

    /**
     * プレイヤーの複数ハンドDOMの差分更新・再利用ロジック
     */
    function updatePlayerHandsDOM() {
        const playerContainer = document.getElementById('player-hands-container');
        
        // 1. 必要に応じて wrapper コンテナを追加・破棄（スプリット時対応）
        while (playerContainer.children.length < playerHands.length) {
            const wrapper = document.createElement('div');
            wrapper.className = 'hand-wrapper';
            wrapper.innerHTML = `
                <div class="hand-header">
                    <span class="hand-title"></span>
                    <span class="score-badge"></span>
                </div>
                <div class="cards-container"></div>
                <div class="hand-footer"></div>
                <div class="badge-placeholder"></div>
            `;
            playerContainer.appendChild(wrapper);
        }
        
        while (playerContainer.children.length > playerHands.length) {
            playerContainer.lastElementChild.remove();
        }

        // 2. 各ハンドラッパーを全初期化せず中の個別テキスト・カードコンテナのみ同期
        playerHands.forEach((hand, index) => {
            const wrapper = playerContainer.children[index];
            
            // 操作対象のアクティブハンド表現
            if (gameState === 'player-turn' && index === activeHandIndex) {
                wrapper.classList.add('active');
            } else {
                wrapper.classList.remove('active');
            }

            // タイトルの書き換え
            const titleEl = wrapper.querySelector('.hand-title');
            titleEl.textContent = `Hand ${playerHands.length > 1 ? (index + 1) : ""}`;

            // スコア表示の更新
            const scoreBadge = wrapper.querySelector('.score-badge');
            let scoreText = hand.visibleScore;
            if (hand.visibleScore > 21) {
                scoreText = `${hand.visibleScore} (Bust!)`;
            }
            scoreBadge.textContent = scoreText;

            // フッターベット金額の書き換え
            const footer = wrapper.querySelector('.hand-footer');
            footer.textContent = `Bet: $${hand.bet}`;

            // 結果通知バッジの追加・削除（不要なチラつきを排除）
            const badgePlaceholder = wrapper.querySelector('.badge-placeholder');
            badgePlaceholder.innerHTML = '';
            if (gameState === 'round-over' || hand.status === 'busted') {
                if (hand.result === 'WIN') {
                    badgePlaceholder.innerHTML = `<div class="result-badge win">WIN</div>`;
                } else if (hand.result === 'LOSE') {
                    badgePlaceholder.innerHTML = `<div class="result-badge lose">LOSE</div>`;
                } else if (hand.result === 'PUSH') {
                    badgePlaceholder.innerHTML = `<div class="result-badge push">PUSH</div>`;
                } else if (hand.result === 'BLACKJACK') {
                    badgePlaceholder.innerHTML = `<div class="result-badge bj">BLACKJACK!</div>`;
                }
            }

            // 本ハンド配下のカードのみDOM同期
            const cardsContainer = wrapper.querySelector('.cards-container');
            syncCardsDOM(cardsContainer, hand.cards);
        });
    }

    /**
     * 所持金および制限に基づいた動的チップ選択エリアの再描画
     */
    function updateChips() {
        const chipArea = document.getElementById('chip-area');
        chipArea.innerHTML = '';

        // 1. 所持金（bankroll）以下の金額のチップのみを画面に描画
        CHIP_VALUES.forEach(val => {
            if (val <= bankroll) {
                const btn = document.createElement('button');
                btn.className = `chip ${CHIP_CLASSES[val]}`;
                btn.textContent = `$${val}`;
                btn.onclick = () => addBet(val);

                // 2. 「追加でベットできる金額（残高 - 現在のベット）」を上回る場合は非活性（disabled）
                // かつベット可能なフェーズ（gameState === 'betting'）のみ有効
                const isBettingPhase = (gameState === 'betting' && !isProcessing);
                const hasEnoughRoom = (val <= (bankroll - currentBet));
                btn.disabled = !(isBettingPhase && hasEnoughRoom);

                chipArea.appendChild(btn);
            }
        });

        // 3. ALL IN ボタンの生成
        const allInBtn = document.createElement('button');
        allInBtn.className = 'action-btn allin-btn';
        allInBtn.id = 'btn-allin';
        allInBtn.textContent = 'All In';
        allInBtn.onclick = allIn;
        allInBtn.disabled = (gameState !== 'betting' || isProcessing || bankroll <= 0 || currentBet === bankroll);
        chipArea.appendChild(allInBtn);

        // 4. Clear ボタンの生成
        const clearBtn = document.createElement('button');
        clearBtn.className = 'action-btn clear-btn';
        clearBtn.id = 'btn-clear';
        clearBtn.textContent = 'Clear';
        clearBtn.onclick = clearBet;
        clearBtn.disabled = (gameState !== 'betting' || isProcessing || currentBet <= 0);
        chipArea.appendChild(clearBtn);

        // 5. Borrow（借金）ボタンの生成
        const borrowBtn = document.createElement('button');
        borrowBtn.className = 'action-btn borrow-btn';
        borrowBtn.id = 'btn-borrow';
        borrowBtn.textContent = 'Borrow';
        borrowBtn.onclick = borrow;
        borrowBtn.disabled = (gameState !== 'betting' || isProcessing || debt >= 5000);
        chipArea.appendChild(borrowBtn);

        // 6. Repay（返済）ボタンの生成
        const repayBtn = document.createElement('button');
        repayBtn.className = 'action-btn repay-btn';
        repayBtn.id = 'btn-repay';
        repayBtn.textContent = 'Repay';
        repayBtn.onclick = repay;
        const repayAmount = Math.min(1000, debt);
        repayBtn.disabled = (gameState !== 'betting' || isProcessing || debt <= 0 || bankroll < repayAmount);
        chipArea.appendChild(repayBtn);
    }

    /**
     * 画面UIの完全な同期更新
     */
    function updateUI() {
        // 残高、ベット、借金表示の更新
        document.getElementById('bankroll-val').textContent = `$${bankroll}`;
        document.getElementById('bet-val').textContent = `$${currentBet}`;
        document.getElementById('debt-val').textContent = `$${debt}`;

        // チップエリアを動的に生成・描画
        updateChips();

        // ディーラーとプレイヤーエリアのDOMを差分同期（破棄・再生成なし）
        updateDealerHandDOM();
        updatePlayerHandsDOM();

        // ボタン等のアクティブ/非アクティブ状態制御
        const btnDeal = document.getElementById('btn-deal');
        const btnHit = document.getElementById('btn-hit');
        const btnStand = document.getElementById('btn-stand');
        const btnDouble = document.getElementById('btn-double');
        const btnSplit = document.getElementById('btn-split');

        // 非同期処理進行中（isProcessing）は全アクションボタンを完全に無効化し連打を防ぐ
        if (isProcessing) {
            btnDeal.disabled = true;
            btnHit.disabled = true;
            btnStand.disabled = true;
            btnDouble.disabled = true;
            btnSplit.disabled = true;
            return;
        }

        if (gameState === 'betting') {
            btnDeal.disabled = (currentBet <= 0);
            btnDeal.textContent = 'DEAL';
            btnHit.disabled = true;
            btnStand.disabled = true;
            btnDouble.disabled = true;
            btnSplit.disabled = true;

            if (currentBet === 0) {
                logMessage("チップをクリックしてベットを決め、DEALを押してください。");
            } else {
                logMessage(`$${currentBet} をベット中。よろしければDEALを押してください。`);
            }
        } else if (gameState === 'dealing') {
            btnDeal.disabled = true;
            btnHit.disabled = true;
            btnStand.disabled = true;
            btnDouble.disabled = true;
            btnSplit.disabled = true;
            logMessage("カードを配っています...");
        } else if (gameState === 'player-turn') {
            btnDeal.disabled = true;
            btnHit.disabled = false;
            btnStand.disabled = false;

            const activeHand = playerHands[activeHandIndex];

            // ダブルダウン判定: 2枚、かつ追加で同額ベット可能な残高がある
            const canDouble = activeHand.cards.length === 2 && bankroll >= activeHand.bet;
            btnDouble.disabled = !canDouble;

            // スプリット判定: 手札が1つのみ（最初のスプリットのみ）、カードが2枚で同じランク、かつ追加で同額ベット可能な残高がある
            const canSplit = playerHands.length === 1 && 
                              activeHand.cards.length === 2 && 
                              activeHand.cards[0].name === activeHand.cards[1].name && 
                              bankroll >= activeHand.bet;
            btnSplit.disabled = !canSplit;

            logMessage(`Hand ${playerHands.length > 1 ? (activeHandIndex + 1) : ""} のアクションを選択してください。`);
        } else {
            // ディーラーターン、ラウンド終了、またはゲームオーバー
            btnDeal.disabled = (gameState !== 'round-over' || currentBet <= 0);
            if (gameState === 'round-over') {
                btnDeal.textContent = 'NEXT ROUND';
            } else {
                btnDeal.textContent = 'DEAL';
            }
            btnHit.disabled = true;
            btnStand.disabled = true;
            btnDouble.disabled = true;
            btnSplit.disabled = true;

            if (gameState === 'dealer-turn') {
                logMessage("ディーラーのターンです...");
            } else if (gameState === 'round-over') {
                logMessage("ラウンド終了。NEXT ROUNDを押して次のゲームに進んでください。");
            } else if (gameState === 'game-over') {
                btnDeal.disabled = true;
                logMessage("GAME OVER! RESET GAMEボタンを押してリセットしてください。");
            }
        }
    }

    // 初期化ロード
    window.onload = function() {
        deck = createDeck();
        shuffle(deck);
        updateUI();
    };
</script>
